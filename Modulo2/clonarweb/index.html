<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon de Starbucks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Starbucks_Corporation_Logo_2011.svg/1200px-Starbucks_Corporation_Logo_2011.svg.png" alt="Logo" class="logo">
            <ul>
                <li>MENU</li>
                <li>REWARDS</li>
            </ul>
        </div>
        <div class="nav-right">
            <span>📍 Localizar Tienda</span>
            <button class="btn-login">Ingresar</button>
            <button class="btn-join">Únete</button>
        </div>
    </nav>

    <section class="promo-row verde-oscuro">
        <div class="promo-image">
            <img src="https://www.starbucks.com.mx/media/m10dfis5/banner_promo_periodo_1.png" alt="Promo 1">
        </div>
        <div class="promo-text">
            <h2>¿Nuevas vibes?</h2>
            <p>Primero tu Starbucks para comenzar este 2026 con tu nuevo mood.</p>
            <button class="btn-outline">Descubre más</button>
        </div>
    </section>

    <section class="promo-row verde-claro reverse">
        <div class="promo-text">
            <h2>Strato Frappuccino: tu próximo Fav</h2>
            <p>Primero tu Starbucks con Fresa Matcha Strato Frappuccino, Brown Sugar, Salted Caramel o Mocha.</p>
            <button class="btn-outline">Descubre más</button>
        </div>
        <div class="promo-image">
            <img src="https://www.starbucks.com.mx/media/zsqn4o5n/frappuccino.png" alt="Promo 2">
        </div>
    </section>

</body>
</html>
