<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas de productos físicos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section> <!-- en esta section tenemos a las tres tarjetas del ejercicio -->
        <article class="tarjeta"> <!-- todas las tarjetas de productos están en esta clase llamada tarjeta -->
            <div id="color-fondo-1"></div>
            <img class="figura" src="https://github.com/gerrardNwoke/codePen-imgs/blob/main/imgs/gow-figurine.png?raw=true" alt="articulo de una figura de acción">
            <h2>Kratos and Artreus Statue - God Of War</h2>
            <p class="entrega">Departure date: 31/03/2021</p>
            <div class="precios">
                <p class="tachado">$999</p>
                <p class="precio">$599</p>
                <img class="corazon" src="./corazon.svg" alt="corazón de la tarjeta">
                <img class="carrito" src="./carrito.svg" alt="carrito de compras">
            </div>
        </article>

        <article class="tarjeta"> <!-- todas las tarjetas de productos están en esta clase llamada tarjeta -->
            <div id="color-fondo-2"></div>
            <img class="figura" src="https://github.com/gerrardNwoke/codePen-imgs/blob/main/imgs/sekiro-figurine.png?raw=true" alt="sekiro-figurine">
            <h2>Sekiro Statue - Sekiro: Shadows Die Twice</h2>
            <p class="entrega">Departure date: 31/03/2021</p>
            <div class="precios">
                <p class="tachado">$999</p>
                <p class="precio">$599</p>
                <img class="corazon" src="./corazon.svg" alt="corazón de la tarjeta">
                <img class="carrito" src="./carrito.svg" alt="carrito de compras">
            </div>
        </article>

        <article class="tarjeta"> <!-- todas las tarjetas de productos están en esta clase llamada tarjeta -->
            <div id="color-fondo-3"></div>
            <img class="figura" src="https://github.com/gerrardNwoke/codePen-imgs/blob/main/imgs/dazai-figurine.png?raw=true" alt="articulo de una figura de acción">
            <h2>Osamu Dazai Funko Pop - Bungou Stray Dogs</h2>
            <p class="entrega">Departure date: 31/03/2021</p>
            <div class="precios">
                <p class="tachado">$999</p>
                <p class="precio">$599</p>
                <img class="corazon" src="./corazon.svg" alt="corazón de la tarjeta">
                <img class="carrito" src="./carrito.svg" alt="carrito de compras">
            </div>
        </article>
        <br>

    </section>
    <img src="./ejemplo.webp" alt="">
</body>
</html>
